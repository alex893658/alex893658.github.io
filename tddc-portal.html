<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal — TDDC Schools &amp; College</title>
<link rel="icon" href="/tddc-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2350; --green:#2E9E44; --green-deep:#1F7A34;
    --flame:#E2492E; --gold:#D4A94C; --cream:#FBF8F2;
    --ink:#1A1B1E; --paper:#FFFFFF; --line:rgba(27,35,80,0.12); --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;}
  h1,h2,h3{font-family:'Fraunces',serif;color:var(--navy);}
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;}

  header{background:var(--navy);padding:14px 24px;}
  nav{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand img{width:36px;}
  .brand span{color:#fff;font-family:'Fraunces',serif;font-weight:700;}
  nav a.back{color:#C9CDE8;font-size:0.88rem;font-weight:500;}

  main{max-width:640px;margin:0 auto;padding:50px 24px 80px;}
  .intro{text-align:center;margin-bottom:30px;}
  .intro img{width:70px;margin:0 auto 14px;}
  .intro h1{font-size:1.7rem;margin-bottom:8px;}
  .intro p{color:#5A5D68;font-size:0.95rem;}

  .tabs{display:flex;background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px;margin-bottom:26px;}
  .tab{flex:1;text-align:center;padding:11px;border-radius:999px;font-weight:600;font-size:0.92rem;color:#5A5D68;cursor:pointer;transition:all .15s ease;}
  .tab.active{background:var(--green);color:#fff;}

  .panel{display:none;}
  .panel.active{display:block;}

  .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:28px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:0.84rem;font-weight:600;color:var(--navy);margin-bottom:6px;}
  .field input, .field select, .field textarea{
    width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:9px;
    font-family:'Inter',sans-serif;font-size:0.95rem;background:var(--cream);
  }
  .field textarea{min-height:90px;resize:vertical;}
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--green);outline-offset:1px;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
    padding:13px;border-radius:999px;font-weight:600;font-size:0.95rem;border:none;cursor:pointer;
    background:var(--flame);color:#fff;transition:transform .15s ease;
  }
  .btn:hover{transform:translateY(-1px);}
  .btn.secondary{background:var(--navy);}
  .login-msg{font-size:0.88rem;margin-top:12px;text-align:center;}

  /* Dashboard */
  .dash{display:none;}
  .dash.active{display:block;}
  .dash-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
  .dash-head h2{font-size:1.3rem;}
  .dash-head p{color:#5A5D68;font-size:0.88rem;}
  .logout{font-size:0.85rem;font-weight:600;color:var(--flame);cursor:pointer;}
  .subtabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
  .subtab{padding:9px 16px;border-radius:999px;font-size:0.86rem;font-weight:600;background:#fff;border:1px solid var(--line);color:var(--navy);cursor:pointer;}
  .subtab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .subpanel{display:none;}
  .subpanel.active{display:block;}

  table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);}
  th,td{padding:10px 12px;text-align:left;font-size:0.86rem;border-bottom:1px solid var(--line);}
  th{background:var(--cream);color:var(--navy);font-weight:700;}
  tr:last-child td{border-bottom:none;}

  .note-item{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px;}
  .note-item h4{font-size:0.98rem;color:var(--navy);margin-bottom:4px;}
  .note-item .meta{font-size:0.78rem;color:var(--green-deep);font-weight:600;margin-bottom:6px;}
  .note-item p{font-size:0.88rem;color:#5A5D68;}
  .note-item a.file{font-size:0.85rem;font-weight:600;color:var(--flame);display:inline-block;margin-top:8px;}
  .empty{color:#8A8D97;font-size:0.9rem;text-align:center;padding:26px 0;}
  .loading{color:#8A8D97;font-size:0.9rem;text-align:center;padding:16px 0;}
</style>
</head>
<body>

<header>
  <nav>
    <div class="brand">
      <img src="/tddc-logo.png" alt="TDDC crest">
      <span>TDDC Portal</span>
    </div>
    <a href="index.html" class="back">← Back to website</a>
  </nav>
</header>

<main>

  <div id="loginView">
    <div class="intro">
      <img src="/tddc-logo.png" alt="TDDC crest">
      <h1>Student &amp; Staff Portal</h1>
      <p>Log in to view results and class notes.</p>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="student">Student</div>
      <div class="tab" data-tab="teacher">Teacher</div>
    </div>

    <div class="panel active" id="studentPanel">
      <div class="card">
        <div class="field">
          <label for="admissionNo">Admission Number</label>
          <input id="admissionNo" placeholder="e.g. TDDC/2024/013">
        </div>
        <div class="field">
          <label for="studentPassword">Password</label>
          <input id="studentPassword" type="password" placeholder="Your password">
        </div>
        <button class="btn" id="studentLoginBtn">Log In</button>
        <p class="login-msg" id="studentLoginMsg"></p>
      </div>
    </div>

    <div class="panel" id="teacherPanel">
      <div class="card">
        <div class="field">
          <label for="staffId">Staff ID</label>
          <input id="staffId" placeholder="e.g. TDDC-STAFF-04">
        </div>
        <div class="field">
          <label for="teacherPassword">Password</label>
          <input id="teacherPassword" type="password" placeholder="Your password">
        </div>
        <button class="btn" id="teacherLoginBtn">Log In</button>
        <p class="login-msg" id="teacherLoginMsg"></p>
      </div>
    </div>
  </div>

  <!-- STUDENT DASHBOARD -->
  <div class="dash" id="studentDash">
    <div class="dash-head">
      <div>
        <h2 id="studentWelcome">Welcome</h2>
        <p id="studentClassLine"></p>
      </div>
      <span class="logout" data-logout>Log out</span>
    </div>
    <div class="subtabs">
      <div class="subtab active" data-sub="results" data-owner="student">Results</div>
      <div class="subtab" data-sub="notes" data-owner="student">Note Bank</div>
    </div>

    <div class="subpanel active" id="student-results">
      <div class="field" style="max-width:220px;">
        <label for="termSelect">Term</label>
        <select id="termSelect">
          <option value="">All Terms</option>
          <option value="First Term">First Term</option>
          <option value="Second Term">Second Term</option>
          <option value="Third Term">Third Term</option>
        </select>
      </div>
      <div id="resultsArea" class="loading">Select a term to view results.</div>
    </div>

    <div class="subpanel" id="student-notes">
      <div id="studentNotesArea" class="loading">Loading notes...</div>
    </div>
  </div>

  <!-- TEACHER DASHBOARD -->
  <div class="dash" id="teacherDash">
    <div class="dash-head">
      <div>
        <h2 id="teacherWelcome">Welcome</h2>
        <p id="teacherClassLine"></p>
      </div>
      <span class="logout" data-logout>Log out</span>
    </div>
    <div class="subtabs">
      <div class="subtab active" data-sub="addnote" data-owner="teacher">Add a Note</div>
      <div class="subtab" data-sub="viewnotes" data-owner="teacher">Class Notes</div>
      <div class="subtab" data-sub="classlist" data-owner="teacher">Class List</div>
    </div>

    <div class="subpanel active" id="teacher-addnote">
      <div class="card">
        <div class="field"><label for="noteTitle">Note title</label><input id="noteTitle" placeholder="e.g. Mid-term revision, Basic Science"></div>
        <div class="field"><label for="noteClass">Class</label><input id="noteClass" placeholder="e.g. JSS 2"></div>
        <div class="field"><label for="noteSubject">Subject</label><input id="noteSubject" placeholder="e.g. Mathematics"></div>
        <div class="field"><label for="noteLink">Link to file (Google Drive link, optional)</label><input id="noteLink" placeholder="https://..."></div>
        <div class="field"><label for="noteDesc">Short description</label><textarea id="noteDesc" placeholder="What is this note about?"></textarea></div>
        <button class="btn secondary" id="addNoteBtn">Add to Note Bank</button>
        <p class="login-msg" id="addNoteMsg"></p>
      </div>
    </div>

    <div class="subpanel" id="teacher-viewnotes">
      <div class="field" style="max-width:260px;">
        <label for="viewClassInput">Class</label>
        <input id="viewClassInput" placeholder="e.g. JSS 2">
      </div>
      <button class="btn secondary" id="loadClassNotesBtn" style="max-width:200px;margin-bottom:18px;">View Notes</button>
      <div id="teacherNotesArea"></div>
    </div>

    <div class="subpanel" id="teacher-classlist">
      <div class="field" style="max-width:260px;">
        <label for="listClassInput">Class</label>
        <input id="listClassInput" placeholder="e.g. JSS 2">
      </div>
      <button class="btn secondary" id="loadClassListBtn" style="max-width:200px;margin-bottom:18px;">View Class List</button>
      <div id="classListArea"></div>
    </div>
  </div>

</main>

<script>
  // ==== SET THIS to your Apps Script Web App URL (must end in /exec) ====
  const API_URL = "https://script.google.com/macros/s/AKfycbzpVG8hHPPBt344_B9AcKSWSYBJGCcYWQOSnZphbByNETCBC6jZkSKm2PkY8tYz_WuY/exec";

  let currentStudent = null;
  let currentTeacher = null;

  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab+'Panel').classList.add('active');
    });
  });

  document.querySelectorAll('.subtab').forEach(st=>{
    st.addEventListener('click', ()=>{
      const owner = st.dataset.owner;
      document.querySelectorAll('.subtab[data-owner="'+owner+'"]').forEach(t=>t.classList.remove('active'));
      st.classList.add('active');
      const dash = owner === 'student' ? document.getElementById('studentDash') : document.getElementById('teacherDash');
      dash.querySelectorAll('.subpanel').forEach(p=>p.classList.remove('active'));
      const idPrefix = owner === 'student' ? 'student-' : 'teacher-';
      document.getElementById(idPrefix+st.dataset.sub).classList.add('active');
    });
  });

  document.querySelectorAll('[data-logout]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      currentStudent = null; currentTeacher = null;
      document.getElementById('studentDash').classList.remove('active');
      document.getElementById('teacherDash').classList.remove('active');
      document.getElementById('loginView').style.display = 'block';
      document.getElementById('studentPassword').value = '';
      document.getElementById('teacherPassword').value = '';
    });
  });

  async function apiCall(params){
    const url = API_URL + '?' + new URLSearchParams(params).toString();
    const res = await fetch(url);
    return res.json();
  }

  document.getElementById('studentLoginBtn').addEventListener('click', async ()=>{
    const admissionNo = document.getElementById('admissionNo').value.trim();
    const password = document.getElementById('studentPassword').value;
    const msg = document.getElementById('studentLoginMsg');
    if(!admissionNo || !password){ msg.style.color='var(--flame)'; msg.textContent='Please fill in both fields.'; return; }
    msg.style.color='#5A5D68'; msg.textContent='Checking...';
    try{
      const data = await apiCall({action:'studentLogin', admissionNo, password});
      if(data.success){
        currentStudent = data;
        document.getElementById('loginView').style.display='none';
        document.getElementById('studentDash').classList.add('active');
        document.getElementById('studentWelcome').textContent = 'Welcome, ' + data.fullName;
        document.getElementById('studentClassLine').textContent = data.className;
        loadStudentNotes();
      } else {
        msg.style.color='var(--flame)'; msg.textContent = data.message;
      }
    } catch(e){ msg.style.color='var(--flame)'; msg.textContent='Could not connect. Please try again.'; }
  });

  document.getElementById('teacherLoginBtn').addEventListener('click', async ()=>{
    const staffId = document.getElementById('staffId').value.trim();
    const password = document.getElementById('teacherPassword').value;
    const msg = document.getElementById('teacherLoginMsg');
    if(!staffId || !password){ msg.style.color='var(--flame)'; msg.textContent='Please fill in both fields.'; return; }
    msg.style.color='#5A5D68'; msg.textContent='Checking...';
    try{
      const data = await apiCall({action:'teacherLogin', staffId, password});
      if(data.success){
        currentTeacher = data;
        document.getElementById('loginView').style.display='none';
        document.getElementById('teacherDash').classList.add('active');
        document.getElementById('teacherWelcome').textContent = 'Welcome, ' + data.fullName;
        document.getElementById('teacherClassLine').textContent = 'Assigned class: ' + (data.assignedClass || '—');
        document.getElementById('noteClass').value = data.assignedClass || '';
        document.getElementById('viewClassInput').value = data.assignedClass || '';
        document.getElementById('listClassInput').value = data.assignedClass || '';
      } else {
        msg.style.color='var(--flame)'; msg.textContent = data.message;
      }
    } catch(e){ msg.style.color='var(--flame)'; msg.textContent='Could not connect. Please try again.'; }
  });

  document.getElementById('termSelect').addEventListener('change', async (e)=>{
    const area = document.getElementById('resultsArea');
    area.className='loading'; area.textContent='Loading...';
    const data = await apiCall({action:'getResults', admissionNo: currentStudent.admissionNo, term: e.target.value});
    if(!data.success){ area.className='empty'; area.textContent = data.message; return; }
    let html = '<table><tr><th>Subject</th><th>CA1</th><th>CA2</th><th>Exam</th><th>Total</th><th>Grade</th><th>Remark</th></tr>';
    data.results.forEach(r=>{
      html += `<tr><td>${r.subject}</td><td>${r.ca1}</td><td>${r.ca2}</td><td>${r.exam}</td><td>${r.total}</td><td>${r.grade}</td><td>${r.remark}</td></tr>`;
    });
    html += '</table>';
    area.className=''; area.innerHTML = html;
  });

  async function loadStudentNotes(){
    const area = document.getElementById('studentNotesArea');
    area.className='loading'; area.textContent='Loading notes...';
    const data = await apiCall({action:'getNotes', className: currentStudent.className});
    renderNotes(data, area);
  }

  function renderNotes(data, area){
    if(!data.success || !data.notes || data.notes.length===0){
      area.className='empty'; area.textContent='No notes uploaded for this class yet.'; return;
    }
    area.className='';
    area.innerHTML = data.notes.map(n=>`
      <div class="note-item">
        <h4>${n.title}</h4>
        <div class="meta">${n.subject || 'General'} · ${n.className}</div>
        <p>${n.description || ''}</p>
        ${n.fileLink ? `<a class="file" href="${n.fileLink}" target="_blank" rel="noopener">Open file →</a>` : ''}
      </div>
    `).join('');
  }

  document.getElementById('addNoteBtn').addEventListener('click', async ()=>{
    const msg = document.getElementById('addNoteMsg');
    const title = document.getElementById('noteTitle').value.trim();
    const className = document.getElementById('noteClass').value.trim();
    if(!title || !className){ msg.style.color='var(--flame)'; msg.textContent='Title and class are required.'; return; }
    msg.style.color='#5A5D68'; msg.textContent='Saving...';
    const data = await apiCall({
      action:'addNote', title, className,
      subject: document.getElementById('noteSubject').value.trim(),
      uploadedBy: currentTeacher.fullName,
      fileLink: document.getElementById('noteLink').value.trim(),
      description: document.getElementById('noteDesc').value.trim()
    });
    if(data.success){
      msg.style.color='var(--green-deep)'; msg.textContent = data.message;
      document.getElementById('noteTitle').value='';
      document.getElementById('noteSubject').value='';
      document.getElementById('noteLink').value='';
      document.getElementById('noteDesc').value='';
    } else {
      msg.style.color='var(--flame)'; msg.textContent = data.message;
    }
  });

  document.getElementById('loadClassNotesBtn').addEventListener('click', async ()=>{
    const area = document.getElementById('teacherNotesArea');
    const className = document.getElementById('viewClassInput').value.trim();
    if(!className) return;
    area.className='loading'; area.textContent='Loading...';
    const data = await apiCall({action:'getNotes', className});
    renderNotes(data, area);
  });

  document.getElementById('loadClassListBtn').addEventListener('click', async ()=>{
    const area = document.getElementById('classListArea');
    const className = document.getElementById('listClassInput').value.trim();
    if(!className) return;
    area.className='loading'; area.textContent='Loading...';
    const data = await apiCall({action:'getClassList', className});
    if(!data.success || !data.students || data.students.length===0){
      area.className='empty'; area.textContent='No students found for this class.'; return;
    }
    let html = '<table><tr><th>Admission No.</th><th>Full Name</th></tr>';
    data.students.forEach(s=>{ html += `<tr><td>${s.admissionNo}</td><td>${s.fullName}</td></tr>`; });
    html += '</table>';
    area.className=''; area.innerHTML = html;
  });
</script>
</body>
</html>
